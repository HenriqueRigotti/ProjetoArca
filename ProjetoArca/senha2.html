<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Crie uma nova senha</title>
  <link rel="stylesheet" href="senha2.css">
</head>

<body>

  <div class="formulario-senha">

    <div class="topo-senha">
      <h2>Crie uma nova senha</h2>
    </div>

    <div class="campo">
      <label>Sua nova senha:</label>
      <input type="password">
    </div>

    <div class="campo">
      <label>Confirme sua nova senha:</label>
      <input type="password">
    </div>

    <div class="requisitos-senha">
      <p>Deve conter no mínimo 8 dígitos</p>
      <p>Um dígito especial (# % * )</p>
      <p>Um número ( 0-9 )</p>
      <p>Pelo menos uma letra maiúscula</p>
    </div>

     <a href="senha.html">  <button class="voltar">Voltar</button></a>
