<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link rel="stylesheet" href="cadastro.css">
</head>

<body>

  <div class="formulario-cadastro">

    <div class="topo-cadastro">
      <h2>Cadastro</h2>
      <p>Crie sua Conta</p>
    </div>

    
      <div class="grade-campos">
        
        <div class="campo">
          <label>Nome Completo</label>
          <input type="text" placeholder="Seu nome" class="fundo-rosa-claro">
        </div>

        <div class="campo">
          <label>CPF</label>
          <input type="text" placeholder="000.000.000-00">
        </div>

        <div class="campo">
          <label>E-mail</label>
          <input type="email" placeholder="seu@gmail.com">
        </div>

        <div class="campo">
          <label>Telefone</label>
          <input type="text" placeholder="(00) 00000-0000">
        </div>

        <div class="campo">
          <label>Endereço</label>
          <input type="text" placeholder="Rua, número" class="fundo-rosa-claro">
        </div>

        <div class="campo">
          <label>Complemento</label>
          <input type="text" placeholder="apto, piso..." class="fundo-rosa-claro">
        </div>

        <div class="campo">
          <label>CEP</label>
          <input type="text" placeholder="00000-0000" class="fundo-rosa-claro">
        </div>

        <div class="campo">
          <label>Estado</label>
          <input type="text" placeholder="Estado" class="fundo-rosa-claro">
         
          </select>
        </div>

        <div class="campo">
          <label>Renda Familiar Mensal</label>
          <select>
            <option>Selecione</option>
            <option>1 Salario Mínimo</option>
            <option>2 Salario Mínimo</option>
            <option>3 Salario Mínimo</option>
            <option>5 ou + Salario Mínimo</option>
          </select>
        </div>

        <div class="texto-informativo">
          <p>Usamos essa informação para oferecer descontos proporcionais</p>
        </div>

        <div class="campo campo-senha">
          <label>Criar sua senha</label>
          <div class="wrapper-senha">
            <input type="password" placeholder="Senha">
            
          </div>
        </div>

        <div class="campo campo-senha">
          <label>Confirme sua senha</label>
          <div class="wrapper-senha">
            <input type="password" placeholder="Confirme sua senha">
            
          </div>
        </div>

      </div>

      <div class="botoes">
        <a href="index.html"> <button type="button" class="voltar">Voltar</button></a>
       <a href="login.html">  <button type="submit" class="continuar">Continuar</button></a>
      </div>
    

  </div>

</body>
</html>
