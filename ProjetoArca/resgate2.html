</head>

<body>

<header class="navbar">
  <h1 class="logo">
<a href="index.html">❤️ ARCA</a>
</h1>

  <nav class="menu">
    <a href="castraçao.html">Castração</a>
    <a href="adoçao.html">Adotar</a>
    <a href="resgate.html" class="ativo">Resgate</a>
    <a href="denuncia.html">Denúncia</a>
  </nav>

  
  <div class="usuario-area">
          <div class="user" onclick="toggleMenu()">👤</div>

          <div class="menu-usuario" id="menuUsuario">
              <a href="login.html"> <div class="item">Entrar</div></a>
          <a href="contato.html">  <div class="item">Contate-nos</div></a>
          <a href="agendamento.html">   <div class="item">Agendamentos</div></a>
          <a href="processo.html">  <div class="item">Processos</div></a>
          <a href="suporte.html" > <div class="item">Suporte</div></a>
          </div>
      </div>
  </div>
  <script src="script.js"></script>
</header>

<main>

  <div class="formulario">

    <div class="titulo-secao">
      <h3>⚠️ Detalhes sobre o Animal</h3>
      <p class="sub">Descreva a situação do animal</p>
    </div>

    <div class="linha-dupla">
      <div class="campo">
        <label>Tipo de Animal *</label>
        <select>
          <option value=""></option>
          <option>Cachorro</option>
          <option>Gato</option>
        </select>
      </div>

      <div class="campo">
        <label>Nível de Urgência *</label>
        <select>
          <option value=""></option>
          <option>Baixo</option>
          <option>Moderado</option>
          <option>Elevado</option>
        </select>
      </div>
    </div>

    <div class="campo">
      <label>Estado do Animal *</label>
      <select>
        <option value=""></option>
        <option>Simples</option>
        <option>Moderado</option>
        <option>Grave</option>
      </select>
    </div>

    <div class="campo">
      <label>Descrição Detalhada *</label>
      <textarea
        placeholder="Descreva o animal, sua condição, comportamento e qualquer informação relevante"></textarea>
    </div>

    <div class="campo">
      <label>Fotos (se possível)</label>
      <div class="upload-container">
        <button class="btn-upload">Escolher arquivos</button>
        <span class="texto-upload">Nenhum arquivo selecionado</span>
      </div>
      <p class="legenda-upload">Fotos ajudam nossa equipe avaliar melhor a situação</p>
    </div>

    <div class="botoes">
      <a href="resgate.html"> <button class="voltar">Voltar</button></a>
      <a href="resgate3.html"> <button class="enviar">Enviar solicitação</button></a>
    </div>

  </div>

</main>

</body>

</html>
