<main>

  <div class="formulario">

    <div class="titulo-secao">
      <h3>❗ Detalhes da Denúncia</h3>
      <p class="sub">Informações sobre o caso de maus-tratos</p>
    </div>

    <div class="linha-dupla">
      <div class="campo flex-3">
        <label>Tipo de Maus-Tratos *</label>
        <select>
          <option value="">Selecione</option>
          <option>Negligência</option>
          <option>Abandono</option>
          <option>Agressão</option>
        </select>
      </div>

      <div class="campo flex-1">
        <label>Quantidade de animais</label>
        <input type="text" placeholder="Ex: 1">
      </div>
    </div>

    <div class="campo">
      <label>Tipo de animal *</label>
      <select>
        <option value="">Selecione</option>
        <option>Cachorro</option>
        <option>Gato</option>
      </select>
    </div>

    <div class="campo">
      <label>Frequência das ocorrências *</label>
      <select>
        <option value="">Selecione</option>
        <option>1</option>
        <option>2</option>
        <option>3 ou +</option>
      </select>
    </div>

    <div class="campo">
      <label>Descrição detalhada *</label>
      <textarea
        placeholder="Descreva o que você presenciou, quando, como o animal aparenta estar, e qualquer outra informação relevante"></textarea>
    </div>

    <div class="campo">
      <label>Evidências (fotos, vídeos)</label>
      <div class="upload-container">
        <button class="btn-upload">Escolher arquivos</button>
        <span class="texto-upload">Nenhum arquivo escolhido</span>
      </div>
      <p class="legenda-upload">Evidências visuais fortalecem a denúncia e agilizam a investigação</p>
    </div>

    <div class="campo-checkbox">
      <input type="checkbox" id="anonima">
      <label for="anonima">Denúncia Anônima</label>
    </div>

    <div class="botoes">
      <a href="denuncia.html"> <button class="cancelar">Cancelar</button></a>
      <a href="denuncia3.html"> <button class="enviar">Enviar solicitação</button></a>
    </div>

  </div>
