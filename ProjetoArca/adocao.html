<header class="titulocaixa">
  <h1>Preferências de Adoção</h1>
  <p>Que tipo de animal você procura?</p>
</header>

<div class="container">

  <div class="formulario">

    <div class="linha">
      <div class="campo">
        <label>Tipo de Animal</label>
        <select>
          <option></option>
          <option>Cachorro</option>
          <option>Gato</option>
        </select>
      </div>

      <div class="campo">
        <label>Porte preferido</label>
        <select>
          <option></option>
          <option>Pequeno</option>
          <option>Médio</option>
          <option>Grande</option>
        </select>
      </div>
    </div>

    <div class="linha">
      <div class="campo">
        <label>Temperamento desejado</label>
        <select>
          <option></option>
          <option>Calmo</option>
          <option>Agitado</option>
        </select>
      </div>

      <div class="campo">
        <label>Custo médio mensal ideal</label>
        <select required>
          <option></option>
          <option>100+</option>
          <option>200+</option>
          <option>300+</option>
        </select>
      </div>
    </div>

    <div class="campo">
      <label>Alguma experiência anterior com animais?</label>
      <input type="text">
    </div>

    <div class="campo">
      <label>Qual o motivo da adoção?</label>
      <input type="text">
    </div>

    <div class="checkbox">
      <input type="checkbox" >
      <span>Concordo com os termos de adoção responsável e me comprometo a cuidar do animal </span>
